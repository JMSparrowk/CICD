name: CI-CD

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 체크아웃
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      # 2. JDK 설정
      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. gradle 권한
      - name: gradlew 권한
        run: chmod +x gradlew

      # 4. 빌드
      - name: 빌드
        run: ./gradlew clean bootJar

      # 5. jar 전송 (파일 1개로 고정)
      - name: EC2 파일 전송
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          source: "build/libs/*.jar"
          target: "/home/ubuntu/app/"

      # 6. EC2 실행
      - name: EC2 실행
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          command_timeout: 10m
          script: |
            set -e
            
            echo "=== 기존 프로세스 종료 ==="
            pkill -f "java -jar" || true
            sleep 2

            echo "=== jar 정리 ==="
            mv /home/ubuntu/app/build/libs/CICDtest-0.0.1-SNAPSHOT.jar /home/ubuntu/app/app.jar

            echo "=== 실행 ==="
            nohup java -jar /home/ubuntu/app/app.jar \
              --server.port=8080 \
              --server.address=0.0.0.0 \
              > /home/ubuntu/app/app.log 2>&1 < /dev/null &

            disown $!
            echo "=== 완료 ==="
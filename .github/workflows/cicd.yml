name: CI-CD

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 체크아웃
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      # 2. JDK 설정
      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # 3. gradle 권한
      - name: gradlew 권한
        run: chmod +x gradlew

      # 4. 빌드
      - name: 빌드
        run: ./gradlew clean bootJar

      # 5. jar 전송
      - name: EC2 파일 전송
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          source: "build/libs/*.jar"
          target: "/home/ubuntu/app/"

      # 6. 실행 (start.sh만 호출)
      - name: EC2 실행
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          command_timeout: 10m
          script: |
            set -e

            echo "=== start.sh 실행 ==="
            chmod +x /home/ubuntu/app/start.sh || true
            /home/ubuntu/app/start.sh

            echo "=== 실행 확인 ==="
            sleep 5
            ps -ef | grep java || echo "실행 안 됨"
            sudo ss -tulnp | grep 8080 || echo "8080 안 열림"

            echo "=== 완료 ==="
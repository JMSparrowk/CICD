name: CI-CD

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. コードチェックアウト
      - name: コードチェックアウト
        uses: actions/checkout@v4

      # 2. JDK設定
      - name: JDK 17 設定
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # 3. gradlew 実行権限付与
      - name: gradlew 権限付与
        run: chmod +x gradlew

      # 4. ビルド
      - name: ビルド
        run: ./gradlew clean bootJar

      # 5. jar ファイル転送
      - name: EC2 にファイル転送
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          source: "build/libs/*.jar"
          target: "/home/ubuntu/app/"

      # 6. 実行（start.sh 呼び出し）
      - name: EC2 で実行
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          command_timeout: 10m
          script: |
            set -e

            echo "=== start.sh 実行 ==="
            chmod +x /home/ubuntu/app/start.sh || true
            /home/ubuntu/app/start.sh

            echo "=== 実行確認 ==="
            sleep 5
            ps -ef | grep java || echo "実行されていません"
            sudo ss -tulnp | grep 8080 || echo "8080 ポートが開いていません"

            echo "=== 完了 ==="